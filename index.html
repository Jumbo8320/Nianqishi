<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>念齐师</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #202124;
      background: #f7f4ef;
    }

    main {
      width: min(100%, 520px);
      padding: 28px;
      border: 1px solid #ded7cc;
      border-radius: 8px;
      background: #fffdfa;
      box-shadow: 0 16px 40px rgba(32, 33, 36, 0.08);
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(28px, 8vw, 42px);
      line-height: 1.1;
      font-weight: 700;
      letter-spacing: 0;
    }

    p {
      margin: 0 0 22px;
      color: #68625a;
      font-size: 16px;
      line-height: 1.65;
    }

    audio {
      width: 100%;
      display: block;
    }

    .hint {
      margin-top: 18px;
      font-size: 14px;
      color: #80786f;
    }
  </style>
</head>
<body>
  <main>
    <h1>念齐师</h1>
    <p>点击播放即可收听。</p>
    <audio controls preload="metadata" src="audio.mp3"></audio>
    <div class="hint">如果没有声音，请检查手机静音开关或音量。</div>
  </main>
</body>
</html>
